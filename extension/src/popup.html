<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Crunchbase Lead Finder</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 340px;
        padding: 12px;
        margin: 0;
        font-size: 13px;
        color: #1e293b;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px 0;
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 11px;
        color: #475569;
      }
      input,
      button {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 13px;
        border-radius: 4px;
        border: 1px solid #cbd5e1;
        margin-top: 2px;
      }
      button {
        cursor: pointer;
        background: #0f172a;
        color: white;
        border: none;
        margin-top: 6px;
      }
      button.secondary {
        background: white;
        color: #0f172a;
        border: 1px solid #cbd5e1;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .row {
        display: flex;
        gap: 6px;
      }
      .row > * {
        flex: 1;
      }
      #status {
        margin-top: 10px;
        padding: 8px;
        border-radius: 4px;
        background: #f1f5f9;
        font-size: 12px;
        max-height: 120px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      hr {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 12px 0;
      }
      .small {
        font-size: 11px;
        color: #64748b;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Crunchbase Lead Finder</h1>

    <label>API URL (Railway)</label>
    <input id="apiUrl" placeholder="https://your-app.up.railway.app" />

    <label>API Token</label>
    <input id="apiToken" type="password" placeholder="Bearer token" />

    <div class="row">
      <div>
        <label>Page delay (ms)</label>
        <input id="pageDelayMs" type="number" min="2000" />
      </div>
      <div>
        <label>Max pages</label>
        <input id="maxPages" type="number" min="1" max="50" />
      </div>
    </div>

    <button id="save" class="secondary">Save settings</button>

    <hr />

    <button id="scrapeOne">Scrape current page</button>
    <button id="scrapeProfile" class="secondary">Scrape this profile</button>
    <button id="autoScrape">Auto-scrape N pages</button>
    <button id="stop" class="secondary" disabled>Stop</button>

    <div id="status">Ready.</div>

    <p class="small">
      Tip: open a Crunchbase People search with your filters first, then click
      "Auto-scrape N pages". Use a secondary CB account.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
